<!DOCTYPE html>
<html>
<head>
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      grid-auto-rows: 10px;
      gap: 10px;
    }
    figure { margin: 0; }
    img { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="gallery-grid" id="grid1">
  </div>
  <script src="assets/main.js"></script>
  <script>
    const grid = document.getElementById('grid1');
    for (let i = 0; i < 500; i++) {
      const figure = document.createElement('figure');
      const img = document.createElement('img');
      img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'; // tiny transparent gif
      img.style.height = (Math.random() * 200 + 50) + 'px';
      figure.appendChild(img);
      grid.appendChild(figure);
    }

    // Warmup
    resizeAllGridItems();

    const start = performance.now();
    for (let i = 0; i < 10; i++) {
        resizeAllGridItems();
    }
    const end = performance.now();
    console.log("Time taken for 10 iterations: " + (end - start) + "ms");
  </script>
</body>
</html>
