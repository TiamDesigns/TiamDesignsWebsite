<!DOCTYPE html>
<html>
<head>
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      grid-auto-rows: 10px;
      gap: 10px;
    }
    figure { margin: 0; }
    img { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="gallery-grid" id="grid1"></div>
  <div class="gallery-grid" id="grid2"></div>
  <script src="assets/main.js"></script>
  <script>
    const grid1 = document.getElementById('grid1');
    const grid2 = document.getElementById('grid2');
    for (let i = 0; i < 2000; i++) {
      const figure = document.createElement('figure');
      const img = document.createElement('img');
      img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
      img.style.height = (Math.random() * 200 + 50) + 'px';
      figure.appendChild(img);
      if (i % 2 === 0) grid1.appendChild(figure);
      else grid2.appendChild(figure);
    }

    // Warmup
    resizeAllGridItems();

    const start = performance.now();
    for (let i = 0; i < 50; i++) {
        resizeAllGridItems();
    }
    const end = performance.now();
    console.log("BENCHMARK_RESULT: " + (end - start));
  </script>
</body>
</html>
